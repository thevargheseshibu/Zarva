<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarva Admin | Custom Jobs</title>
    <style>
        :root {
            --bg: #0A0A0F;
            --surface: #12121A;
            --elevated: #1A1A26;
            --primary: #C9A84C;
            --text-main: #F0EDE8;
            --text-muted: #9E9EAF;
            --success: #10B981;
            --danger: #EF4444;
            --border: #2A2A35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .header {
            background-color: var(--surface);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: var(--primary);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .dashboard-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
        }

        .tab {
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            background: var(--elevated);
            color: var(--primary);
            border-color: var(--primary);
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 99px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .status-badge.pending {
            background: #F59E0B22;
            color: #F59E0B;
        }

        .status-badge.approved {
            background: #10B98122;
            color: #10B981;
        }

        .status-badge.rejected {
            background: #EF444422;
            color: #EF4444;
        }

        .card-body {
            color: var(--text-muted);
            font-size: 0.9rem;
            flex-grow: 1;
        }

        .meta-list {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .meta-list strong {
            color: var(--text-main);
        }

        .meta-list span {
            display: flex;
            justify-content: space-between;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            text-align: center;
        }

        .btn-approve {
            background: var(--success);
            color: white;
        }

        .btn-approve:hover {
            filter: brightness(1.1);
        }

        .btn-reject {
            background: var(--surface);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-reject:hover {
            background: var(--danger);
            color: white;
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .auth-box input {
            width: 100%;
            padding: 0.75rem;
            margin: 1rem 0;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--elevated);
            color: white;
        }
    </style>
</head>

<body>

    <!-- Simple Auth Lock (Not secure for pro, just to set Bearer token for API calls) -->
    <div class="auth-overlay" id="authScreen">
        <div class="auth-box">
            <h2 style="color: var(--primary); margin-bottom: 0.5rem;">Admin Login Needed</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Please enter your admin JWT token to access this
                portal.</p>
            <input type="text" id="tokenInput" placeholder="eyJhbGciOiJIUzI1NiIs..." />
            <button class="btn btn-approve" onclick="login()">Enter Dashboard</button>
        </div>
    </div>

    <header class="header">
        <h1>Zarva Admin</h1>
        <div style="color: var(--text-muted); font-size: 0.9rem;">Custom Job Review Portal</div>
    </header>

    <main class="container">
        <div class="dashboard-controls">
            <div class="tabs">
                <div class="tab active" onclick="setFilter('pending')">Pending Review</div>
                <div class="tab" onclick="setFilter('approved')">Approved</div>
                <div class="tab" onclick="setFilter('rejected')">Rejected</div>
            </div>
            <button class="btn" style="background: var(--elevated); color: white; flex: 0 0 120px;"
                onclick="loadTemplates()">🔄 Refresh</button>
        </div>

        <div class="template-grid" id="grid">
            <!-- Templates injected here -->
        </div>
    </main>

    <script>
        let token = localStorage.getItem('admin_token');
        let currentFilter = 'pending';
        let allTemplates = [];

        if (token) {
            document.getElementById('authScreen').style.display = 'none';
            loadTemplates();
        }

        function login() {
            const input = document.getElementById('tokenInput').value;
            if (input) {
                token = input;
                localStorage.setItem('admin_token', token);
                document.getElementById('authScreen').style.display = 'none';
                loadTemplates();
            }
        }

        function setFilter(status) {
            currentFilter = status;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
                if (t.innerText.toLowerCase().includes(status)) t.classList.add('active');
            });
            renderGrid();
        }

        async function loadTemplates() {
            try {
                // Fetching all (requires admin route which usually only has pending)
                // Let's assume the API returns what we need, if not we'll just show what the API gives
                document.getElementById('grid').innerHTML = '<p style="color: var(--text-muted);">Loading records from server...</p>';
                const res = await fetch('/api/admin/custom-jobs/pending', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401 || res.status === 403) {
                    alert('Session expired or unauthorized. Please re-enter admin token.');
                    localStorage.removeItem('admin_token');
                    document.getElementById('authScreen').style.display = 'flex';
                    return;
                }

                const data = await res.json().catch(() => []);
                allTemplates = Array.isArray(data) ? data : [];
                renderGrid();
            } catch (err) {
                console.error(err);
                document.getElementById('grid').innerHTML = `<p style="color: var(--danger);">Failed to load data: ${err.message}</p>`;
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const filtered = allTemplates.filter(t => t.approval_status === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML = `<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 3rem;">No ${currentFilter} templates found.</p>`;
                return;
            }

            filtered.forEach(tmpl => {
                const photosHtml = tmpl.photo_urls && tmpl.photo_urls.length > 0
                    ? `<a href="${tmpl.photo_urls[0]}" target="_blank" style="color: var(--primary); font-size: 0.8rem;">View Attachment 📷</a>`
                    : '<span style="color: var(--text-muted); font-size: 0.8rem;">No photos attached</span>';

                const actionsHtml = currentFilter === 'pending' ? `
                    <div class="card-actions">
                        <button class="btn btn-reject" onclick="handleAction(${tmpl.id}, 'reject')">Reject</button>
                        <button class="btn btn-approve" onclick="handleAction(${tmpl.id}, 'approve')">Approve</button>
                    </div>
                ` : '';

                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">${tmpl.title}</div>
                            <span class="status-badge ${tmpl.approval_status}">${tmpl.approval_status}</span>
                        </div>
                        <div class="card-body">
                            "${tmpl.description}"
                            
                            <div class="meta-list">
                                <span><strong>Customer ID:</strong> ${tmpl.customer_id}</span>
                                <span><strong>Proposed Rate:</strong> <span style="color: var(--primary); font-size: 1.1rem; font-weight: bold;">₹${tmpl.hourly_rate}/hr</span></span>
                                <span><strong>Submitted:</strong> ${new Date(tmpl.created_at).toLocaleDateString()}</span>
                                ${photosHtml}
                            </div>
                        </div>
                        ${actionsHtml}
                    </div>
                `;
            });
        }

        async function handleAction(id, action) {
            const reason = action === 'reject' ? prompt('Please enter a rejection reason (e.g. Rate too low, Spam):') : 'Approve';
            if (action === 'reject' && !reason) return; // Cancelled

            try {
                const res = await fetch(`/api/admin/custom-jobs/${id}/${action}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ reason: reason || 'Approved' })
                });

                if (res.ok) {
                    // Update local state and re-render
                    const tIndex = allTemplates.findIndex(x => x.id === id);
                    if (tIndex > -1) {
                        allTemplates[tIndex].approval_status = action === 'approve' ? 'approved' : 'rejected';
                    }
                    renderGrid();
                } else {
                    const err = await res.json().catch(() => ({}));
                    alert(`Failed to ${action}: ` + (err?.error || err?.message || 'Unknown error'));
                }
            } catch (error) {
                console.error(error);
                alert('Network Error occurred');
            }
        }
    </script>
</body>

</html>
